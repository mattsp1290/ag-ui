name: Lint Release Workflows

# Runs actionlint + shellcheck against the release / create-pr and
# release / publish pipelines and the scripts they call. Keeps these
# critical, retry-sensitive files from silently regressing on shell or
# action-syntax bugs.
#
# Scope is intentionally narrow: only the release workflows and
# scripts/release/*. Expanding later is cheap; starting narrow avoids
# drowning unrelated changes in pre-existing lint noise.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/prepare-release.yml"
      - ".github/workflows/publish-release.yml"
      - ".github/workflows/lint-release-workflows.yml"
      - "scripts/release/**"
      - "nx.json"
  pull_request:
    paths:
      - ".github/workflows/prepare-release.yml"
      - ".github/workflows/publish-release.yml"
      - ".github/workflows/lint-release-workflows.yml"
      - "scripts/release/**"
      - "nx.json"

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run actionlint on release workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          reporter: github-check
          level: error
          fail_level: error
          actionlint_flags: >-
            .github/workflows/prepare-release.yml
            .github/workflows/publish-release.yml
            .github/workflows/lint-release-workflows.yml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on release scripts
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/release/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts under scripts/release/"
            exit 0
          fi
          shellcheck --severity=warning "${files[@]}"

  release-allowlist-sync:
    # Verifies nx.json's release.projects matches release.config.json's
    # TypeScript package allowlist. Drift between these two lists causes
    # nx release publish to either fail (extra project without versionActions)
    # or silently skip a package (missing from nx.json).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Verify nx.json and release.config.json are in sync
        run: bash scripts/release/verify-nx-release-allowlist.sh
