name: release / pre

# Mirrors CopilotKit's `release / pre` DX. Publishes a canary build directly
# (no PR needed) with a timestamp or custom suffix. Run it multiple times
# with the same suffix to canary a coherent cross-scope set together.
#
# SECURITY: Build and publish are split into separate jobs. Publishing
# secrets (NPM_TOKEN, PYPI_API_TOKEN) are only available in the publish
# job, never in the same process tree as build-time code execution.

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "What to release"
        required: true
        type: choice
        options:
          - integration-a2a
          - integration-adk
          - integration-ag2
          - integration-agent-spec
          - integration-agno
          - integration-aws-strands
          - integration-claude-agent-sdk-py
          - integration-claude-agent-sdk-ts
          - integration-crewai-py
          - integration-crewai-ts
          - integration-langchain
          - integration-langgraph-py
          - integration-langgraph-ts
          - integration-langroid
          - integration-llama-index
          - integration-mastra
          - integration-pydantic-ai
          - integration-spring-ai
          - middleware-a2a
          - middleware-a2ui
          - middleware-mcp-apps
          - sdk-py
          - sdk-ts
      suffix:
        description: "Version suffix (e.g. 'fix-user-issue'). Leave blank for timestamp."
        required: false
        type: string
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_VERBOSE_LOGGING: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      ts_projects: ${{ steps.ts.outputs.projects }}
      ts_count: ${{ steps.ts.outputs.count }}
      has_py_packages: ${{ steps.py.outputs.has_packages }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0
        with:
          version: "10.33.4"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ">=0.8.0"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute prerelease version and bump
        id: bump
        env:
          INPUT_SUFFIX: ${{ inputs.suffix }}
          INPUT_SCOPE: ${{ inputs.scope }}
        run: |
          SUFFIX="$INPUT_SUFFIX"
          if [ -z "$SUFFIX" ]; then
            SUFFIX=$(date +%s)
          fi

          RESULT=$(pnpm tsx scripts/release/prepare-release.ts \
            --scope "$INPUT_SCOPE" \
            --bump prerelease \
            --preid "canary.${SUFFIX}")

          echo "$RESULT" > /tmp/bump-result.json

          {
            echo "## Prerelease packages"
            jq -r '.packages[] | "- **\(.name)**: \(.oldVersion) → \(.newVersion)"' /tmp/bump-result.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Extract TypeScript projects in scope
        id: ts
        run: |
          PROJECTS=$(jq -r '[.packages[] | select(.ecosystem == "typescript") | .name] | join(",")' /tmp/bump-result.json)
          COUNT=$(jq '[.packages[] | select(.ecosystem == "typescript")] | length' /tmp/bump-result.json)
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "TypeScript projects in scope: $PROJECTS"
          else
            echo "No TypeScript projects in scope — build/test/publish will be skipped"
          fi

      - name: Check for Python packages
        id: py
        run: |
          PY_COUNT=$(jq '[.packages[] | select(.ecosystem == "python")] | length' /tmp/bump-result.json)
          if [ "$PY_COUNT" -gt 0 ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build TypeScript packages in scope
        if: steps.ts.outputs.count != '0'
        run: npx nx run-many -t build --projects="${STEPS_TS_OUTPUTS_PROJECTS}"
        env:
          STEPS_TS_OUTPUTS_PROJECTS: ${{ steps.ts.outputs.projects }}

      - name: Test TypeScript packages in scope
        if: steps.ts.outputs.count != '0'
        run: npx nx run-many -t test --projects="${STEPS_TS_OUTPUTS_PROJECTS}"
        env:
          STEPS_TS_OUTPUTS_PROJECTS: ${{ steps.ts.outputs.projects }}

      - name: Upload TypeScript build artifacts
        if: steps.ts.outputs.count != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ts-canary-artifacts
          path: |
            sdks/typescript/packages/*/dist/
            integrations/*/typescript/dist/
            middlewares/*/dist/
          retention-days: 1

      - name: Build Python packages
        if: steps.py.outputs.has_packages == 'true'
        run: |
          PY_PACKAGES=$(jq -c '[.packages[] | select(.ecosystem == "python")]' /tmp/bump-result.json)
          while read -r pkg; do
            FILE=$(echo "$pkg" | jq -r '.file')
            DIR=$(dirname "$FILE")
            BUILD_SYSTEM=$(echo "$pkg" | jq -r '.buildSystem // "uv"')
            echo "Building Python canary from $DIR"
            cd "$DIR"
            if [ "$BUILD_SYSTEM" = "poetry" ]; then
              poetry build
            else
              uv build
            fi
            cd "$GITHUB_WORKSPACE"
          done < <(echo "$PY_PACKAGES" | jq -c '.[]')

      - name: Upload Python build artifacts
        if: steps.py.outputs.has_packages == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: py-canary-artifacts
          path: |
            sdks/python/dist/
            integrations/*/python/dist/
          retention-days: 1

      - name: Upload bump result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bump-result
          path: /tmp/bump-result.json
          retention-days: 1

  publish:
    needs: build
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download bump result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: bump-result
          path: /tmp/

      # --- TypeScript publish ---
      - name: Setup pnpm
        if: needs.build.outputs.ts_count != '0'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0
        with:
          version: "10.33.4"

      - name: Setup Node
        if: needs.build.outputs.ts_count != '0'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Download TypeScript build artifacts
        if: needs.build.outputs.ts_count != '0'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ts-canary-artifacts

      - name: Publish TypeScript packages
        if: needs.build.outputs.ts_count != '0'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NEEDS_BUILD_OUTPUTS_TS_PROJECTS: ${{ needs.build.outputs.ts_projects }}
        run: |
          echo "Publishing TypeScript canary: ${NEEDS_BUILD_OUTPUTS_TS_PROJECTS}"
          npx nx release publish --projects="${NEEDS_BUILD_OUTPUTS_TS_PROJECTS}" --tag canary

      # --- Python publish ---
      - name: Install uv
        if: needs.build.outputs.has_py_packages == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ">=0.8.0"

      - name: Download Python build artifacts
        if: needs.build.outputs.has_py_packages == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: py-canary-artifacts

      - name: Publish Python packages
        if: needs.build.outputs.has_py_packages == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          PY_PACKAGES=$(jq -c '[.packages[] | select(.ecosystem == "python")]' /tmp/bump-result.json)
          PY_COUNT=$(echo "$PY_PACKAGES" | jq 'length')
          if [ "$PY_COUNT" -gt 0 ]; then
            FAILED=0
            while read -r pkg; do
              FILE=$(echo "$pkg" | jq -r '.file')
              DIR=$(dirname "$FILE")
              echo "Publishing Python canary from $DIR"
              if [ -d "${DIR}/dist" ]; then
                uv publish "${DIR}/dist/*"
              else
                echo "WARNING: No dist/ found at ${DIR} — skipping"
                FAILED=1
              fi
            done < <(echo "$PY_PACKAGES" | jq -c '.[]')
            if [ "$FAILED" -ne 0 ]; then
              echo "ERROR: One or more Python canary publishes failed" >&2
              exit 1
            fi
          fi

      - name: Publish summary
        run: |
          {
            echo ""
            echo "Published canary versions."
            echo ""
            jq -r '.packages[] | select(.ecosystem == "typescript") | "```\nnpm install \(.name)@canary\n```"' /tmp/bump-result.json
            jq -r '.packages[] | select(.ecosystem == "python") | "```\npip install \(.name)==\(.newVersion)\n```"' /tmp/bump-result.json
          } >> "$GITHUB_STEP_SUMMARY"

  dry-run-summary:
    needs: build
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    steps:
      - name: Dry-run summary
        run: |
          {
            echo ""
            echo "**DRY RUN** — no packages were published"
          } >> "$GITHUB_STEP_SUMMARY"
