name: unit

on:
  push:
    branches: [main]
    paths:
      - "sdks/community/go/**"
      - ".github/workflows/unit-go-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/community/go/**"
      - ".github/workflows/unit-go-sdk.yml"

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect fork PR
        id: fork-check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "prefix=fork-" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Setup Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ steps.fork-check.outputs.prefix }}${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ steps.fork-check.outputs.prefix }}${{ runner.os }}-go-

      - name: Download dependencies
        working-directory: sdks/community/go
        run: go mod download

      - name: Run tests
        working-directory: sdks/community/go
        run: go test ./... -v
